app:
  name: "WebSec Toolkit"
  version: "1.0.0"
  author: "Security Team"
  language: "zh_CN"
  theme: "dark"
  
gui:
  window_size: [1400, 900]
  window_title: "WebSec Toolkit - Web安全集成工具"
  sidebar_width: 250
  status_bar_height: 30
  animation_enabled: true
  
database:
  type: "sqlite"
  path: "data/websec.db"
  backup_enabled: true
  backup_interval: 3600
  
logging:
  level: "INFO"
  file: "logs/app.log"
  max_size: 10485760
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
proxy:
  enabled: false
  http: ""
  https: ""
  socks5: ""
  
tools:
  auto_update: true
  timeout: 300
  max_concurrent: 10
  
scanner:
  threads: 20
  timeout: 30
  retry: 3
  delay: 0
  
report:
  default_format: "html"
  output_dir: "reports"
  template: "default"
